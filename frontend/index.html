    <!-- 파비콘: 검정 사각 배경의 PWA 아이콘 대신 투명 배경 글리프 사용.
         탭 크기(16/32px)에 맞춰 미리 다운스케일+샤픈한 파일을 제공해 축소 뭉개짐을 방지.
         PWA/애플 아이콘(pwa-192/512)은 마스커블 요건상 불투명 배경이 필요해 그대로 유지. -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <!-- 배율 잠금: 설치형 PWA(standalone)에서 당겨서 새로고침하면 크롬이 이전 배율을
         복원해 화면이 확대된 채(=스크롤 생기고 깨져 보임) 로드되는 버그 차단.
         maximum-scale=1만으로 안 막히는 기기가 있어 user-scalable=no까지 잠그고,
         그래도 scale≠1로 뜨면 아래 워치독 스크립트가 메타 재적용으로 강제 리셋한다.
         viewport-fit=cover는 Android 15 엣지투엣지에서 상태바 겹침을 유발할 수 있어 뺐다.
         (확대가 필요한 사용자는 크롬 접근성 '강제 확대 사용'으로 여전히 핀치 줌 가능) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script>
      // 배율 워치독: 로드 직후 visualViewport.scale이 1이 아니면(새로고침 배율 복원 버그)
      // viewport 메타 내용을 잠깐 바꿨다 되돌려 브라우저가 배율을 다시 계산하게 만든다.
      // 로드/복원 시점에만 동작하므로 사용자가 접근성 강제 확대로 직접 키운 배율과는 안 싸운다.
      (function () {
        var resetScale = function () {
          var vv = window.visualViewport;
          var meta = document.querySelector('meta[name="viewport"]');
          if (!vv || !meta || Math.abs(vv.scale - 1) < 0.01) return;
          var content = meta.getAttribute('content');
          meta.setAttribute('content', content.replace('initial-scale=1.0', 'initial-scale=1.01'));
          setTimeout(function () { meta.setAttribute('content', content); }, 50);
        };
        window.addEventListener('load', resetScale);
        window.addEventListener('pageshow', resetScale); // bfcache 복원·앱 재진입 대비
      })();
    </script>
    <meta name="color-scheme" content="light dark" />
    <title>부천참빛교회 | 상동 참빛교회 공식 홈페이지</title>

    <!-- 테마 선적용: React 마운트 전(첫 페인트 전)에 .dark 클래스를 동기로 붙여
         새로고침 시 라이트→다크로 튀는 FOUC(테마 플래시)를 제거한다.
         저장 키/기본값은 ThemeContext.tsx 와 동일하게 'theme', 기본 'dark'. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}

        // 아이콘 폰트가 준비되기 전 ligature 원문("home" 등 글자)이 잠깐 보이는 것을 막는다.
        // JS 가 동작할 때만 .fonts-pending 을 붙여 아이콘 글자를 감추고(공간은 유지),
        // 폰트가 로드되거나 안전장치 타임아웃 후 풀어준다. (no-JS 면 그대로 노출)
        var de = document.documentElement;
        de.classList.add('fonts-pending');
        var reveal = function () { de.classList.remove('fonts-pending'); };
        try {
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(reveal);
          } else {
            reveal();
          }
        } catch (e) { reveal(); }
        // 폰트 로드가 지연/실패해도 아이콘이 영영 숨지 않도록 최대 2초 뒤 강제 노출
        setTimeout(reveal, 2000);

        // --vvh: JS로 실측한 "실제 보이는 높이".
        // 설치형 WebAPK는 새로고침 후 vh/dvh를 시스템 바(상태바·제스처바)를 포함한
        // 높이로 잘못 계산하는 경우가 있어, 화면에 딱 맞춰야 하는 레이아웃
        // (로그인·회원가입·성경 등)은 이 변수를 우선 사용한다. 크롬 탭에서는 dvh와 동일값.
        // 배율≠1(확대 복원 버그) 상태에서는 visualViewport.height가 축소값이므로 innerHeight로 폴백.
        var setVvh = function () {
          var vv = window.visualViewport;
          var h = (vv && Math.abs(vv.scale - 1) < 0.01) ? vv.height : window.innerHeight;
          de.style.setProperty('--vvh', Math.round(h) + 'px');
        };
        setVvh();
        if (window.visualViewport) window.visualViewport.addEventListener('resize', setVvh);
        window.addEventListener('resize', setVvh);
        window.addEventListener('pageshow', setVvh);
      })();
    </script>
